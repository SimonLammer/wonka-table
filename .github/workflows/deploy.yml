name: Deploy Main and Debug to GitHub Pages

on:
  push:
    branches:
      - main
      - debug # Trigger deploy when either branch updates

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-site

      - name: Checkout Debug Branch
        uses: actions/checkout@v4
        with:
          ref: debug
          path: main-site/debug # Puts the debug branch inside a folder

      - name: Remove nested .git folder so Git treats it as normal files
        run: rm -rf main-site/debug/.git

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./main-site # Deploys the combined folder
